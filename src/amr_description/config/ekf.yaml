ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    print_diagnostics: false

    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     odom

    # ── SENSOR 1: Odometri Encoder Roda (/odom dari odom_node) ──────────────
    # Menyumbangkan: posisi X, Y dan kecepatan Vx, Vyaw
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_queue_size: 10

    # IMU dinonaktifkan sementara — quaternion dari micro-ROS Teensy tidak stabil saat startup
    # dan menyebabkan EKF NaN. Aktifkan kembali setelah IMU firmware terkonfirmasi stabil.
    # imu0: /imu/data_fixed
    # imu0_config: [false, false, false,
    #               false, false, true,
    #               false, false, false,
    #               false, false, false,
    #               false, false, false]
    # imu0_differential: false
    # imu0_relative: true
    # imu0_queue_size: 10
    # imu0_remove_gravitational_acceleration: false
